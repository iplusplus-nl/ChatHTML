<sessiontitle>2048 Game</sessiontitle>
<chat></chat>
<streamui>
<style>
  .game-2048-container {
    --bg: #212121;
    --board-bg: #806b5b; /* Modified for better contrast against dark mode */
    --empty-cell: rgba(238, 228, 218, 0.2);
    --text-dark: #776e65;
    --text-light: #f9f6f2;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    max-width: 420px;
    margin: 0 auto;
    color: var(--streamui-text);
    user-select: none;
    touch-action: none; /* Prevent scroll on swipe */
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .game-title {
    font-size: 3rem;
    font-weight: bold;
    margin: 0;
    line-height: 1;
  }

  .scores-container {
    display: flex;
    gap: 10px;
  }

  .score-box {
    background: #806b5b;
    padding: 6px 15px;
    border-radius: 6px;
    color: white;
    text-align: center;
    min-width: 60px;
  }

  .score-label {
    font-size: 0.8rem;
    text-transform: uppercase;
    color: #eee4da;
    font-weight: 600;
  }

  .score-val {
    font-size: 1.25rem;
    font-weight: bold;
    margin-top: 2px;
  }

  .game-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .game-intro {
    font-size: 1rem;
    color: var(--streamui-muted);
    margin: 0;
  }

  .new-game-btn {
    background: #a67c52;
    color: #f9f6f2;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }
  .new-game-btn:hover { background: #ba8c5d; }

  .game-board {
    position: relative;
    background: var(--board-bg);
    border-radius: 8px;
    width: 100%;
    aspect-ratio: 1 / 1;
    padding: 2%;
    box-sizing: border-box;
  }

  /* Structural Grid Background */
  .grid-bg {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 2.66%; /* Relative gap */
    width: 100%;
    height: 100%;
  }

  .grid-cell {
    background: var(--empty-cell);
    border-radius: 4px;
    width: 100%;
    height: 100%;
  }

  /* Tiles Base Container */
  .tile-container {
    position: absolute;
    top: 2%; left: 2%;
    width: 96%; height: 96%;
    pointer-events: none;
  }

  .tile {
    position: absolute;
    width: 23%;
    height: 23%;
    background: #eee4da;
    border-radius: 4px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    font-weight: bold;
    color: var(--text-dark);
    /* Transition handle position sliding and scaling */
    transition: transform 0.15s ease-in-out, background-color 0.15s;
    /* Positioning driven by inline style vars */
    transform: translate(calc(var(--c) * 111.5%), calc(var(--r) * 111.5%));
    z-index: 10;
  }

  .tile.new { animation: appear 0.2s; }
  .tile.merged { animation: pop 0.2s; }

  @keyframes appear {
    0% { opacity: 0; transform: translate(calc(var(--c) * 111.5%), calc(var(--r) * 111.5%)) scale(0); }
    100% { opacity: 1; transform: translate(calc(var(--c) * 111.5%), calc(var(--r) * 111.5%)) scale(1); }
  }

  @keyframes pop {
    0% { transform: translate(calc(var(--c) * 111.5%), calc(var(--r) * 111.5%)) scale(1); }
    50% { transform: translate(calc(var(--c) * 111.5%), calc(var(--r) * 111.5%)) scale(1.15); }
    100% { transform: translate(calc(var(--c) * 111.5%), calc(var(--r) * 111.5%)) scale(1); }
  }

  /* Tile Colors */
  .tile[data-val="2"] { background: #eee4da; color: #776e65; font-size: 2.5rem; }
  .tile[data-val="4"] { background: #ede0c8; color: #776e65; font-size: 2.5rem; }
  .tile[data-val="8"] { background: #f2b179; color: #f9f6f2; font-size: 2.5rem; }
  .tile[data-val="16"] { background: #f59563; color: #f9f6f2; font-size: 2.2rem; }
  .tile[data-val="32"] { background: #f67c5f; color: #f9f6f2; font-size: 2.2rem; }
  .tile[data-val="64"] { background: #f65e3b; color: #f9f6f2; font-size: 2.2rem; }
  .tile[data-val="128"] { background: #edcf72; color: #f9f6f2; font-size: 1.8rem; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.2), inset 0 0 0 1px rgba(255,255,255,0.1); }
  .tile[data-val="256"] { background: #edcc61; color: #f9f6f2; font-size: 1.8rem; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.3), inset 0 0 0 1px rgba(255,255,255,0.1); }
  .tile[data-val="512"] { background: #edc850; color: #f9f6f2; font-size: 1.8rem; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.4), inset 0 0 0 1px rgba(255,255,255,0.1); }
  .tile[data-val="1024"] { background: #edc53f; color: #f9f6f2; font-size: 1.5rem; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.5), inset 0 0 0 1px rgba(255,255,255,0.1); }
  .tile[data-val="2048"] { background: #edc22e; color: #f9f6f2; font-size: 1.5rem; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.6), inset 0 0 0 1px rgba(255,255,255,0.1); }

  .game-message {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(33, 33, 33, 0.85); /* Adjust for dark mode overlay */
    z-index: 100;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 8px;
  }
  .game-message.active { display: flex; }
  .game-message p {
    font-size: 3rem; font-weight: bold; margin: 0 0 20px 0; color: #f9f6f2; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
</style>

<div class="game-2048-container">
  <div class="game-header">
    <h1 class="game-title">2048</h1>
    <div class="scores-container">
      <div class="score-box">
        <div class="score-label">Score</div>
        <div class="score-val" id="score">2148</div>
      </div>
      <div class="score-box">
        <div class="score-label">Best</div>
        <div class="score-val" id="best-score">5432</div>
      </div>
    </div>
  </div>

  <div class="game-controls">
    <p class="game-intro">Join the numbers to get <strong>2048</strong>.<br/><small class="streamui-muted">Use arrow keys or swipe.</small></p>
    <button class="new-game-btn" id="new-game-btn">New Game</button>
  </div>

  <div class="game-board" id="game-board">
    <div class="grid-bg">
      <!-- 16 Empty background cells explicitly present -->
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
      <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
    </div>

    <div class="tile-container" id="tile-container">
      <!-- Plausible Mid-Game Seed: Snake formation -->
      <div class="tile" data-val="128" style="--r: 0; --c: 0;">128</div>
      <div class="tile" data-val="64" style="--r: 0; --c: 1;">64</div>
      <div class="tile" data-val="32" style="--r: 0; --c: 2;">32</div>
      <div class="tile" data-val="16" style="--r: 0; --c: 3;">16</div>

      <div class="tile" data-val="8" style="--r: 1; --c: 0;">8</div>
      <div class="tile" data-val="4" style="--r: 1; --c: 1;">4</div>
      <div class="tile" data-val="2" style="--r: 1; --c: 2;">2</div>
    </div>

    <div class="game-message" id="game-message">
      <p id="message-text">Game Over!</p>
      <button class="new-game-btn" id="retry-btn">Try Again</button>
    </div>
  </div>
</div>

<script>
  (function() {
    let board = [];
    let score = 2148;
    let bestScore = 5432;
    let size = 4;
    let moving = false;
    let container = document.getElementById("tile-container");
    let scoreEl = document.getElementById("score");
    let bestEl = document.getElementById("best-score");
    let msgScreen = document.getElementById("game-message");
    let msgText = document.getElementById("message-text");

    // Initialize board from DOM
    function initFromDOM() {
      board = Array.from({length: size}, () => Array(size).fill(null));
      const tiles = document.querySelectorAll('.tile');
      tiles.forEach(t => {
        const r = parseInt(t.style.getPropertyValue('--r'));
        const c = parseInt(t.style.getPropertyValue('--c'));
        const val = parseInt(t.getAttribute('data-val'));
        board[r][c] = { val, el: t };
      });
    }

    function createTile(r, c, val) {
      const tile = document.createElement("div");
      tile.className = "tile new";
      tile.setAttribute("data-val", val);
      tile.style.setProperty("--r", r);
      tile.style.setProperty("--c", c);
      tile.innerText = val;
      container.appendChild(tile);
      board[r][c] = { val, el: tile };
    }

    function spawnRandom() {
      let empty = [];
      for (let r=0; r<size; r++) {
        for (let c=0; c<size; c++) {
          if (!board[r][c]) empty.push({r, c});
        }
      }
      if (empty.length > 0) {
        let pos = empty[Math.floor(Math.random() * empty.length)];
        createTile(pos.r, pos.c, Math.random() < 0.9 ? 2 : 4);
      }
    }

    function move(dr, dc) {
      if (moving) return;
      let moved = false;
      let scoreIncrease = 0;
      let mergedThisTurn = Array.from({length: size}, () => Array(size).fill(false));

      const traverse = [];
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          traverse.push({r, c});
        }
      }
      if (dr === 1) traverse.reverse();
      if (dc === 1) traverse.reverse();

      traverse.forEach(pos => {
        let r = pos.r;
        let c = pos.c;
        if (!board[r][c]) return;

        let tile = board[r][c];
        let currR = r, currC = c;
        let nextR = currR + dr, nextC = currC + dc;

        while (
          nextR >= 0 && nextR < size &&
          nextC >= 0 && nextC < size &&
          !board[nextR][nextC]
        ) {
          currR = nextR; currC = nextC;
          nextR += dr; nextC += dc;
        }

        let isMerge = false;
        if (
          nextR >= 0 && nextR < size &&
          nextC >= 0 && nextC < size &&
          board[nextR][nextC] &&
          board[nextR][nextC].val === tile.val &&
          !mergedThisTurn[nextR][nextC]
        ) {
          currR = nextR; currC = nextC;
          isMerge = true;
        }

        if (currR !== r || currC !== c) {
          moved = true;
          board[r][c] = null;
          tile.el.style.setProperty("--r", currR);
          tile.el.style.setProperty("--c", currC);

          if (isMerge) {
            let targetTile = board[currR][currC];
            let newVal = tile.val * 2;
            mergedThisTurn[currR][currC] = true;
            board[currR][currC] = { val: newVal, el: null }; // placeholder till animation finishes
            scoreIncrease += newVal;

            setTimeout(() => {
              targetTile.el.remove();
              tile.el.remove();
              let newEl = document.createElement("div");
              newEl.className = "tile merged";
              newEl.setAttribute("data-val", newVal);
              newEl.style.setProperty("--r", currR);
              newEl.style.setProperty("--c", currC);
              newEl.innerText = newVal;
              container.appendChild(newEl);
              board[currR][currC].el = newEl;
            }, 150);
          } else {
            board[currR][currC] = tile;
          }
        }
      });

      if (moved) {
        moving = true;
        score += scoreIncrease;
        scoreEl.innerText = score;
        if (score > bestScore) {
          bestScore = score;
          bestEl.innerText = bestScore;
        }

        setTimeout(() => {
          spawnRandom();
          checkGameOver();
          moving = false;
        }, 150);
      }
    }

    function checkGameOver() {
      let isOver = true;
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (!board[r][c]) { isOver = false; break; }
          const val = board[r][c].val;
          if (c < size - 1 && board[r][c+1] && board[r][c+1].val === val) isOver = false;
          if (r < size - 1 && board[r+1][c] && board[r+1][c].val === val) isOver = false;
        }
      }
      if (isOver) {
        msgText.innerText = "Game Over!";
        msgScreen.classList.add("active");
      }
    }

    function resetGame() {
      score = 0;
      scoreEl.innerText = score;
      container.innerHTML = "";
      board = Array.from({length: size}, () => Array(size).fill(null));
      msgScreen.classList.remove("active");
      spawnRandom();
      spawnRandom();
    }

    // Input Handling
    window.addEventListener("keydown", (e) => {
      if (msgScreen.classList.contains("active")) return;
      if (e.key === "ArrowUp") { e.preventDefault(); move(-1, 0); }
      if (e.key === "ArrowDown") { e.preventDefault(); move(1, 0); }
      if (e.key === "ArrowLeft") { e.preventDefault(); move(0, -1); }
      if (e.key === "ArrowRight") { e.preventDefault(); move(0, 1); }
    }, {passive: false});

    let touchStartX = 0, touchStartY = 0;
    const boardEl = document.getElementById("game-board");

    boardEl.addEventListener("touchstart", e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      e.preventDefault();
    }, {passive: false});

    boardEl.addEventListener("touchend", e => {
      if(msgScreen.classList.contains("active")) return;
      let dx = e.changedTouches[0].clientX - touchStartX;
      let dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (Math.abs(dx) > 30) move(0, dx > 0 ? 1 : -1);
      } else {
        if (Math.abs(dy) > 30) move(dy > 0 ? 1 : -1, 0);
      }
    });

    document.getElementById("new-game-btn").addEventListener("click", resetGame);
    document.getElementById("retry-btn").addEventListener("click", resetGame);

    // Boot
    initFromDOM();
  })();
</script>
</streamui>
